name: Publish production images

on:
  pull_request:
    paths:
      - .github/workflows/publish-production-images.yml
      - .dockerignore
      - deploy/images/**
      - deploy/gitops-targets.json
      - cmd/**
      - examples/tinyidp-message-app/**
      - internal/**
      - pkg/**
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-production-images.yml
      - .dockerignore
      - deploy/images/**
      - deploy/gitops-targets.json
      - cmd/**
      - examples/tinyidp-message-app/**
      - internal/**
      - pkg/**
      - go.mod
      - go.sum
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-production-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  message-desk:
    name: Build and publish Message Desk
    uses: go-go-golems/infra-tooling/.github/workflows/publish-ghcr-image.yml@main
    secrets: inherit
    with:
      dockerfile: ./deploy/images/Dockerfile.message-desk
      build_context: .
      test_command: go test ./examples/tinyidp-message-app -count=1
      go_version_file: go.mod
      image_name: ghcr.io/go-go-golems/tiny-idp-message-desk
      platforms: linux/amd64
      gitops_target_config: deploy/gitops-targets.json
      push_image: ${{ github.event_name != 'pull_request' }}
      # Tiny-IDP waits for this job and writes the two-image desired state only
      # after both matching immutable images are available.
      open_gitops_pr: false
      tooling_repository: go-go-golems/infra-tooling
      tooling_ref: main

  tinyidp:
    name: Build and publish Tiny-IDP
    needs: message-desk
    uses: go-go-golems/infra-tooling/.github/workflows/publish-ghcr-image.yml@main
    secrets: inherit
    with:
      dockerfile: ./deploy/images/Dockerfile.tinyidp
      build_context: .
      test_command: go test ./cmd/tinyidp ./internal/cmds ./pkg/idpsignup -count=1
      go_version_file: go.mod
      image_name: ghcr.io/go-go-golems/tiny-idp
      platforms: linux/amd64
      gitops_target_config: deploy/gitops-targets.json
      push_image: ${{ github.event_name != 'pull_request' }}
      # This job waits for the matching Message Desk image. It is therefore
      # the single writer of the two-image desired-state update.
      open_gitops_pr: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      gitops_pr_token_source: github_app
      vault_role: tiny-idp-gitops-pr
      gitops_app_secret_path: kv/data/ci/github/tiny-idp/gitops-pr-app
      gitops_app_owner: wesen
      gitops_app_repositories: 2026-03-27--hetzner-k3s
      tooling_repository: go-go-golems/infra-tooling
      tooling_ref: main
