name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  GOTOOLCHAIN: local
  GOWORK: "off"

jobs:
  goreleaser-linux:
    name: Build Linux release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Enable pinned pnpm for generated xapp assets
        run: corepack enable && corepack prepare pnpm@10.15.0 --activate
      - name: Install xapp frontend dependencies
        working-directory: cmd/tinyidp-xapp/app/frontend
        run: pnpm install --frozen-lockfile
      - name: Run source release gates
        run: make verify
      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GGOOS: linux
      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux
          path: dist

  goreleaser-darwin:
    name: Build Darwin release artifacts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Enable pinned pnpm for generated xapp assets
        run: corepack enable && corepack prepare pnpm@10.15.0 --activate
      - name: Install xapp frontend dependencies
        working-directory: cmd/tinyidp-xapp/app/frontend
        run: pnpm install --frozen-lockfile
      - name: Run source release gates
        run: make verify
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GGOOS: darwin
      - uses: actions/upload-artifact@v7
        with:
          name: dist-darwin
          path: dist

  goreleaser-merge:
    name: Merge, sign, and publish release
    needs:
      - goreleaser-linux
      - goreleaser-darwin
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache: true
      - uses: actions/download-artifact@v8
        with:
          path: dist-parts
      - name: Merge release artifacts
        run: |
          rm -rf dist
          mkdir -p dist
          for part in dist-linux dist-darwin; do
            if [ -d "dist-parts/${part}/dist" ]; then
              cp -a "dist-parts/${part}/dist/." dist/
            else
              cp -a "dist-parts/${part}/." dist/
            fi
          done
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GO_GO_GOLEMS_SIGN_KEY }}
          passphrase: ${{ secrets.GO_GO_GOLEMS_SIGN_PASSPHRASE }}
          fingerprint: "6EBE1DF0BDF48A1BBA381B5B79983EF218C6ED7E"
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  publish-docs:
    name: Publish Glazed help package
    needs:
      - goreleaser-merge
    if: startsWith(github.ref, 'refs/tags/v')
    uses: go-go-golems/infra-tooling/.github/workflows/publish-docsctl.yml@main
    with:
      package_name: tinyidp
      package_version: ${{ github.ref_name }}
      export_command: go run ./cmd/tinyidp help export --format sqlite --output-path .docsctl/tinyidp-help.sqlite
      sqlite_path: .docsctl/tinyidp-help.sqlite
      docsctl_install_command: go install github.com/go-go-golems/glazed/cmd/docsctl@latest
      vault_role: docsctl-tinyidp-publisher
      vault_token_role: docsctl-tinyidp-publisher
      registry_url: https://docs-registry.yolo.scapegoat.dev
      verify_packages_url: https://docs.yolo.scapegoat.dev/api/packages
      verify_publish: true
