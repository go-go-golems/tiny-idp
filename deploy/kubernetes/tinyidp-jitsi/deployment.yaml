apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyidp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tinyidp
      app.kubernetes.io/component: identity-provider
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinyidp
        app.kubernetes.io/component: identity-provider
    spec:
      enableServiceLinks: false
      serviceAccountName: tinyidp-jitsi
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: initialize-state-permissions
          image: busybox:1.38.0
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /state/audit
              chmod 0700 /state /state/audit
              chown -R 65532:65532 /state
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [CHOWN]
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: state
              mountPath: /state
      containers:
        - name: tinyidp
          image: ghcr.io/go-go-golems/tiny-idp:sha-REPLACE_WITH_MERGED_COMMIT
          imagePullPolicy: IfNotPresent
          args:
            - serve-production
            - --addr=:8081
            - --admin-addr=:9090
            - --listener-mode=trusted-proxy-http
            - --issuer=https://idp-jitsi.yolo.scapegoat.dev
            - --clients-file=/config/clients.json
            - --theme-catalog-file=/config/themes.json
            - --signup-program-file=/config/open-signup.js
            - --db=/state/tinyidp.sqlite
            - --audit-path=/state/audit/audit.jsonl
            - --token-secret-file=/run/tinyidp-secrets/token-secret
            - --trusted-proxy-cidrs=10.42.0.0/16
            - --rate-limit=100
            - --account-chooser
            - --jitsi-enabled
            - --jitsi-public-origin=https://meet.yolo.scapegoat.dev
            - --jitsi-xmpp-domain=meet.yolo.scapegoat.dev
            - --jitsi-app-id=tinyidp-jitsi-prod
            - --jitsi-oidc-client-id=tinyidp-jitsi-prod
            - --jitsi-token-ttl=5m
            - --jitsi-shared-secret-file=/run/tinyidp-secrets/jitsi-shared-secret
            - --jitsi-policy-program-file=/config/jitsi-policy.js
            - --jitsi-policy-pool-size=4
          env:
            - name: HOME
              value: /var/lib/tinyidp
          ports:
            - name: http
              containerPort: 8081
            - name: admin
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: runtime-secret
              mountPath: /run/tinyidp-secrets
              readOnly: true
            - name: state
              mountPath: /state
      volumes:
        - name: config
          configMap:
            name: tinyidp-jitsi-config
        - name: runtime-secret
          secret:
            secretName: tinyidp-jitsi-runtime
            defaultMode: 0400
            items:
              - key: TINYIDP_TOKEN_SECRET
                path: token-secret
              - key: JWT_APP_SECRET
                path: jitsi-shared-secret
        - name: state
          persistentVolumeClaim:
            claimName: tinyidp-state
