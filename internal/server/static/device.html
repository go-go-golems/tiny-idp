<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tiny IdP Device Approval</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 4rem auto; padding: 0 1rem; }
    input, button { font-size: 1rem; padding: .5rem; width: 100%; box-sizing: border-box; }
    label { display: block; margin: 1rem 0 .4rem; }
    button { margin-top: 1rem; cursor: pointer; }
    .hint { color: #666; font-size: .9rem; }
    .error { color: #900; background: #fee; border: 1px solid #eaa; padding: .75rem; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .deny { background: #f7f7f7; }
  </style>
</head>
<body>
  <h1>Tiny IdP Device Approval</h1>
  <p class="hint">Approve a local test device-code request. Password is optional unless the selected seeded user fixture defines one.</p>

  {{if .Message}}<p class="error">{{.Message}}</p>{{end}}

  <form method="post" action="device">
    <label for="user_code">User code</label>
    <input id="user_code" name="user_code" autocomplete="one-time-code" autofocus placeholder="ABCD-EFGH" value="{{.UserCode}}">

    <label for="login">Login</label>
    <input id="login" name="login" autocomplete="username" placeholder="alice or alice@example.test" value="{{.LoginHint}}">

    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="optional fixture password">

    <div class="actions">
      <button type="submit" name="action" value="approve">Approve</button>
      <button class="deny" type="submit" name="action" value="deny">Deny</button>
    </div>
  </form>
</body>
</html>
