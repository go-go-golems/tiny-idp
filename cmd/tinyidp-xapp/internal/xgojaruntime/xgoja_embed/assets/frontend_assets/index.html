<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tiny-idp private object</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>
<body class="bg-body-tertiary">
  <main class="container py-5" style="max-width: 52rem">
    <h1 class="mb-3">Private durable object</h1>
    <p id="status" class="alert alert-secondary" role="status">Checking application session…</p>
    <section id="app" class="card shadow-sm d-none">
      <div class="card-body">
        <p class="text-body-secondary">Signed in as <code id="user-id"></code></p>
        <label for="document" class="form-label">JSON document</label>
        <textarea id="document" class="form-control font-monospace" rows="14">{}</textarea>
        <div class="d-flex gap-2 mt-3">
          <button id="reload" type="button" class="btn btn-outline-secondary">Reload</button>
          <button id="save" type="button" class="btn btn-primary">Save</button>
          <form action="/auth/logout" method="post" class="ms-auto">
            <button type="submit" class="btn btn-outline-danger">Log out</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
