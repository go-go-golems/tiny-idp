apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tinyidp-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tinyidp
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tinyidp-allow-traefik
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tinyidp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8081
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tinyidp-allow-admin-scrape
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tinyidp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tinyidp-allow-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tinyidp
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
