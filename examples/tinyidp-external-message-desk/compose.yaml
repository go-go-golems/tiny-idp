services:
  idp:
    build:
      context: ../..
      dockerfile: examples/tinyidp-external-message-desk/Dockerfile.idp
    command: ["/usr/local/bin/tinyidp-external-idp", "--state-root", "/state", "--issuer", "http://localhost:8081", "--listen", ":8081", "--seed-file", "/config/demo-seed.json"]
    ports: ["8081:8081"]
    volumes:
      - idp-state:/state
      - ./demo-seed.json:/config/demo-seed.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/readyz"]
      interval: 5s
      timeout: 3s
      retries: 12

  message-desk:
    build:
      context: ../..
      dockerfile: examples/tinyidp-external-message-desk/Dockerfile.message-desk
    command:
      - /bin/sh
      - -ec
      - |
        if [ ! -f /state/state.json ]; then
          tinyidp-message-desk init --state-root /state --public-base-url http://localhost:8080
        fi
        exec tinyidp-message-desk serve --state-root /state --addr :8080 --external-issuer http://localhost:8081 --external-backchannel-url http://idp:8081
    ports: ["8080:8080"]
    volumes:
      - message-desk-state:/state
    depends_on:
      idp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  idp-state:
  message-desk-state:
