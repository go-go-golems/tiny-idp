pre-commit:
  commands:
    lint:
      glob: '*.go'
      run: make lint
    test:
      glob: '*.go'
      run: make test
    generated-loggers:
      glob: '*.go'
      run: make logcopter-check
  parallel: true

pre-push:
  commands:
    release-snapshot:
      run: make goreleaser
    lint:
      run: make lint
    test:
      run: make test
    generated-loggers:
      run: make logcopter-check
  parallel: true
